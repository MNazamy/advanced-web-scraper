<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Web Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07070f;
      --surface:     rgba(255,255,255,0.04);
      --border:      rgba(255,255,255,0.08);
      --accent-a:    #7c3aed;
      --accent-b:    #2563eb;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --card-hover:  rgba(255,255,255,0.06);
      --freq-bg:     rgba(124,58,237,0.18);
      --freq-border: rgba(124,58,237,0.45);
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px; line-height: 1.6; }

    /* ── nav ── */
    .nav {
      position: relative; z-index: 2;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 16px 28px; gap: 6px;
    }
    .nav a {
      font-size: 0.8rem; font-weight: 500; text-decoration: none;
      color: var(--muted); padding: 5px 14px; border-radius: 20px;
      border: 1px solid transparent; transition: all 0.15s;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .nav a:hover { color: var(--text); border-color: var(--border); }
    .nav a.active { color: #c4b5fd; border-color: rgba(124,58,237,0.45); background: rgba(124,58,237,0.1); }

    /* ── topic selector ── */
    .topic-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
    }
    .topic-label {
      font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .topic-select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.82rem;
      padding: 5px 14px; outline: none; cursor: pointer;
      transition: border-color 0.2s; min-width: 200px;
    }
    .topic-select:focus { border-color: rgba(124,58,237,0.5); }
    .topic-select option { background: #13131f; }
    .topic-new-wrap {
      display: none; align-items: center; gap: 6px;
    }
    .topic-new-wrap.visible { display: flex; }
    .topic-new-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.82rem;
      padding: 5px 14px; outline: none; width: 180px;
      transition: border-color 0.2s;
    }
    .topic-new-input:focus { border-color: rgba(124,58,237,0.5); }
    .btn-create-topic {
      background: none; border: 1px solid rgba(124,58,237,0.45);
      border-radius: 20px; color: #c4b5fd; font-size: 0.78rem;
      font-weight: 600; padding: 5px 14px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-create-topic:hover { background: rgba(124,58,237,0.12); }

    body::before, body::after {
      content: ""; position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
      top: -150px; left: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,0.12), transparent 70%);
      bottom: -100px; right: -100px;
    }

    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 0 16px 80px;
    }

    /* ── hero ── */
    #hero {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 14vh; transition: padding-top 0.5s ease;
    }
    #hero.has-results { padding-top: 40px; }

    .logo {
      font-size: 2.4rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 6px;
    }
    .tagline {
      font-size: 0.82rem; color: var(--muted);
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 32px;
    }

    /* ── search bar ── */
    .search-wrap { width: 100%; max-width: 680px; }

    .search-box {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; padding: 6px 6px 6px 22px;
      backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box:focus-within {
      border-color: rgba(124,58,237,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12), 0 8px 40px rgba(0,0,0,0.4);
    }
    #search-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 1rem; caret-color: #a78bfa;
    }
    #search-input::placeholder { color: var(--muted); }

    .btn-search {
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff; border: none; border-radius: 40px;
      padding: 10px 26px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-search:hover:not(:disabled) { opacity: 0.88; transform: scale(1.02); }
    .btn-search:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── inline input error ── */
    .input-error {
      min-height: 18px; margin-top: 10px;
      font-size: 0.8rem; color: #f87171;
      text-align: center; animation: fadeUp 0.2s ease;
    }

    /* ── engine cards ── */
    .engine-row {
      display: flex; gap: 8px; margin-top: 14px;
      flex-wrap: wrap; justify-content: center; align-items: center;
    }

    .engine-card {
      display: flex; align-items: center;
      border: 1px solid var(--border); border-radius: 30px;
      overflow: hidden; transition: border-color 0.15s, background 0.15s;
      cursor: default;
    }
    .engine-card.active {
      border-color: rgba(124,58,237,0.55);
      background: rgba(124,58,237,0.10);
    }

    .engine-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px 5px 12px; background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .engine-card.active .engine-toggle-btn { color: #c4b5fd; }
    .engine-card:not(.active) .engine-toggle-btn:hover { color: var(--text); }

    .toggle-dot {
      width: 7px; height: 7px; flex-shrink: 0; border-radius: 50%;
      background: var(--muted); transition: background 0.15s;
    }
    .engine-card.active .toggle-dot { background: #a78bfa; }

    .engine-divider {
      width: 1px; height: 22px; background: var(--border); flex-shrink: 0;
    }

    .engine-pages {
      width: 36px; padding: 4px 6px; background: none; border: none;
      color: var(--text); font-size: 0.8rem; text-align: center;
      outline: none; cursor: text;
    }
    .engine-card:not(.active) .engine-pages { color: var(--muted); opacity: 0.35; pointer-events: none; }
    .engine-pages::-webkit-inner-spin-button,
    .engine-pages::-webkit-outer-spin-button { -webkit-appearance: none; }
    .engine-pages { -moz-appearance: textfield; }

    .pages-suffix {
      padding-right: 10px; font-size: 0.7rem; color: var(--muted);
      white-space: nowrap;
    }
    .engine-card:not(.active) .pages-suffix { opacity: 0.35; }
    .engine-toggle {
      font-size: 0.75rem; font-weight: 500; padding: 4px 14px;
      border-radius: 20px; border: 1px solid var(--border);
      color: var(--muted); background: transparent;
      cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
      transition: all 0.15s; user-select: none;
    }
    .engine-toggle.active {
      border-color: rgba(124,58,237,0.6); color: #c4b5fd;
      background: rgba(124,58,237,0.12);
    }
    .engine-toggle:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* ── progress panel ── */
    #progress-panel {
      display: none; flex-direction: column; align-items: flex-start;
      gap: 0; margin-top: 32px; width: 100%; max-width: 360px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px;
      backdrop-filter: blur(12px);
    }
    #progress-panel.visible { display: flex; }

    .progress-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 14px; font-weight: 600;
    }

    .step-row {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 5px 0;
    }
    .step-row.substep { padding: 3px 0 3px 22px; }

    .step-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .step-icon.pending::before {
      content: ""; display: block; width: 8px; height: 8px;
      border-radius: 50%; border: 2px solid var(--muted);
    }
    .step-icon.running::before {
      content: ""; display: block; width: 12px; height: 12px;
      border-radius: 50%; border: 2px solid var(--border);
      border-top-color: #a78bfa; animation: spin 0.7s linear infinite;
    }
    .step-icon.done::before {
      content: "✓"; font-size: 11px; font-weight: 700; color: #34d399;
    }
    .step-icon.error::before {
      content: "✗"; font-size: 11px; font-weight: 700; color: #f87171;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .step-label { font-size: 0.88rem; color: var(--text); text-transform: capitalize; }
    .step-label.substep { font-size: 0.78rem; color: var(--muted); text-transform: none; }
    .step-label.running { color: #c4b5fd; }
    .step-label.done    { color: var(--muted); }

    .engine-header {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 6px 0 2px; margin-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .engine-header:first-of-type { border-top: none; margin-top: 0; }

    /* ── results ── */
    #results-area { width: 100%; max-width: 760px; margin-top: 36px; }

    .results-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }
    .results-label { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .results-count { font-size: 0.8rem; color: var(--muted); }

    .result-card {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px; border-radius: 12px; border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .result-card:hover { background: var(--card-hover); border-color: var(--border); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rank {
      min-width: 28px; text-align: right; font-size: 0.78rem;
      color: var(--muted); padding-top: 3px; font-variant-numeric: tabular-nums;
    }
    .result-body { flex: 1; min-width: 0; }
    .result-title {
      font-size: 0.95rem; font-weight: 600; color: #c4b5fd;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .result-url {
      display: block; font-size: 0.78rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-decoration: none;
    }
    .result-url:hover { color: #a78bfa; text-decoration: underline; }
    a.result-title-link { text-decoration: none; color: inherit; }
    a.result-title-link:hover .result-title { color: #e9d5ff; }

    .freq-badge {
      flex-shrink: 0; font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      background: var(--freq-bg); border: 1px solid var(--freq-border);
      color: #c4b5fd; font-variant-numeric: tabular-nums; white-space: nowrap;
    }

    .error-msg { color: #f87171; font-size: 0.85rem; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="/" class="active">Search</a>
  <a href="/topics">Topics</a>
</nav>

<div id="app">
  <div id="hero">
    <div class="logo">Advanced Web Scraper</div>
    <div class="tagline">Multi-engine · Frequency-ranked · Real results</div>

    <div class="topic-row">
      <span class="topic-label">Topic</span>
      <select class="topic-select" id="topic-select" onchange="onTopicChange()">
        <option value="">— No topic —</option>
        <option value="__new__">+ Create new topic…</option>
      </select>
      <div class="topic-new-wrap" id="topic-new-wrap">
        <input class="topic-new-input" id="topic-new-input" type="text" placeholder="Topic name…" />
        <button class="btn-create-topic" onclick="createTopic()">Create</button>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <input id="search-input" type="text" placeholder="Search anything…" autocomplete="off" />
        <button class="btn-search" id="btn-search" onclick="startSearch()">Search</button>
      </div>

      <div id="input-error" class="input-error" aria-live="polite"></div>

      <div class="engine-row" id="engine-row">
        {% for engine in engines %}
        <div class="engine-card active" data-engine="{{ engine }}">
          <button class="engine-toggle-btn" onclick="toggleEngine(this.closest('.engine-card'))">
            <span class="toggle-dot"></span>
            <span>{{ engine }}</span>
          </button>
          <span class="engine-divider"></span>
          <input class="engine-pages" type="number" value="2" min="1" max="10" title="Pages for {{ engine }}" />
          <span class="pages-suffix">pg</span>
        </div>
        {% endfor %}
      </div>
    </div>

    <div id="progress-panel">
      <div class="progress-title">Pipeline progress</div>
      <div id="steps-list"></div>
    </div>
  </div>

  <div id="results-area"></div>
</div>

<script>
  let _pollInterval = null;

  const FILLERS = new Set({{ fillers | tojson }});

  // ── topics ──
  async function loadTopics() {
    try {
      const res = await fetch("/api/topics");
      const topics = await res.json();
      const sel = document.getElementById("topic-select");
      // remove old topic options (keep "no topic" + "create new")
      [...sel.options].filter(o => o.dataset.topicId).forEach(o => o.remove());
      topics.forEach(t => {
        const opt = new Option(t.topic_name, t.topic_id);
        opt.dataset.topicId = t.topic_id;
        sel.add(opt, sel.options[1]); // insert before "create new"
      });
    } catch (e) { console.error("Failed to load topics", e); }
  }

  function onTopicChange() {
    const val = document.getElementById("topic-select").value;
    document.getElementById("topic-new-wrap").classList.toggle("visible", val === "__new__");
  }

  async function createTopic() {
    const name = document.getElementById("topic-new-input").value.trim();
    if (!name) return;
    try {
      const res = await fetch("/api/topics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });
      if (!res.ok) { const d = await res.json(); alert(d.error); return; }
      const topic = await res.json();
      await loadTopics();
      document.getElementById("topic-select").value = topic.topic_id;
      document.getElementById("topic-new-input").value = "";
      document.getElementById("topic-new-wrap").classList.remove("visible");
    } catch (e) { alert("Failed to create topic"); }
  }

  function selectedTopicId() {
    const val = document.getElementById("topic-select").value;
    return val && val !== "__new__" ? parseInt(val) : null;
  }

  function sanitizeQuery(term) {
    return term.split(/\s+/).filter(w => w && !FILLERS.has(w.toLowerCase()));
  }

  function setInputError(msg) {
    document.getElementById("input-error").textContent = msg;
  }

  const SUBSTEP_LABELS = {
    scraping:  "Scraping",
    ocr:       "OCR cross-check",
    filter:    "Filter & deduplicate",
    frequency: "Frequency analysis",
    store:     "Store to database",
  };

  document.getElementById("search-input").addEventListener("keydown", e => {
    if (e.key === "Enter") startSearch();
  });
  document.getElementById("search-input").addEventListener("input", () => setInputError(""));

  function toggleEngine(card) {
    const active = document.querySelectorAll(".engine-card.active");
    if (card.classList.contains("active") && active.length === 1) return;
    card.classList.toggle("active");
    card.querySelector(".engine-pages").disabled = !card.classList.contains("active");
  }

  function enginePages() {
    const result = {};
    document.querySelectorAll(".engine-card.active").forEach(card => {
      result[card.dataset.engine] = Math.max(1, Math.min(10, parseInt(card.querySelector(".engine-pages").value) || 2));
    });
    return result;
  }

  async function startSearch() {
    const term = document.getElementById("search-input").value.trim();
    if (!term) return;

    const sanitizedWords = sanitizeQuery(term);
    if (sanitizedWords.length < 4) {
      const kept = sanitizedWords.length;
      setInputError(
        `Too vague — after removing common words, only ${kept} meaningful word${kept === 1 ? "" : "s"} remain${kept === 1 ? "s" : ""}. Please add more specific terms (need at least 4).`
      );
      return;
    }
    setInputError("");

    const pages = enginePages();
    const engines = Object.keys(pages);
    setLoading(true, engines);
    clearResults();

    try {
      const res = await fetch("/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ term, engines, pages, topic_id: selectedTopicId() }),
      });
      const data = await res.json();
      if (data.error) { showError(data.error); setLoading(false, []); return; }
      pollStatus(data.job_id);
    } catch (err) {
      showError("Failed to start search: " + err.message);
      setLoading(false, []);
    }
  }

  function pollStatus(jobId) {
    _pollInterval = setInterval(async () => {
      try {
        const res = await fetch("/status/" + jobId);
        const job = await res.json();

        if (job.steps) renderSteps(job.steps);

        if (job.status === "done") {
          clearInterval(_pollInterval);
          setTimeout(() => { setLoading(false, []); fetchResults(job.batch_id); }, 900);
        } else if (job.status === "error") {
          clearInterval(_pollInterval);
          setLoading(false, []);
          showError("Pipeline error: " + job.error);
        }
      } catch (e) { /* network blip */ }
    }, 2000);
  }

  function renderSteps(steps) {
    const list = document.getElementById("steps-list");
    list.innerHTML = "";

    steps.forEach(step => {
      if (step.substeps) {
        // engine group header
        const header = document.createElement("div");
        header.className = "engine-header";
        header.innerHTML = `<span class="step-icon ${step.status}"></span>
                            <span class="step-label ${step.status}">${step.label}</span>`;
        list.appendChild(header);

        step.substeps.forEach(sub => {
          const row = document.createElement("div");
          row.className = "step-row substep";
          row.innerHTML = `<span class="step-icon ${sub.status}"></span>
                           <span class="step-label substep ${sub.status}">${sub.label}</span>`;
          list.appendChild(row);
        });
      } else {
        // flat step (sanitize)
        const row = document.createElement("div");
        row.className = "step-row";
        row.innerHTML = `<span class="step-icon ${step.status}"></span>
                         <span class="step-label ${step.status}">${step.label}</span>`;
        list.appendChild(row);
      }
    });
  }

  function setLoading(on, engines) {
    document.getElementById("btn-search").disabled = on;
    const panel = document.getElementById("progress-panel");
    if (on) {
      // render initial pending state immediately — will be updated on first poll
      const initialSteps = [{ id: "sanitize", label: "Sanitize query", status: "pending" }];
      engines.forEach(e => {
        initialSteps.push({
          id: e, label: e.charAt(0).toUpperCase() + e.slice(1), status: "pending",
          substeps: Object.entries(SUBSTEP_LABELS).map(([id, label]) => ({ id, label, status: "pending" })),
        });
      });
      renderSteps(initialSteps);
      panel.classList.add("visible");
    } else {
      panel.classList.remove("visible");
    }
  }

  async function fetchResults(batchId) {
    try {
      const res = await fetch("/results/" + batchId);
      renderResults(await res.json());
    } catch (err) {
      showError("Failed to load results: " + err.message);
    }
  }

  function renderResults(results) {
    document.getElementById("hero").classList.add("has-results");
    const area = document.getElementById("results-area");

    if (!results.length) {
      area.innerHTML = '<p class="error-msg">No results found.</p>';
      return;
    }

    let html = `
      <div class="results-header">
        <span class="results-label">Results</span>
        <span class="results-count">${results.length} URLs · ranked by frequency</span>
      </div>`;

    results.forEach((r, i) => {
      const title = r.title || extractDomain(r.url);
      const delay = Math.min(i * 15, 500);
      html += `
        <div class="result-card" style="animation-delay:${delay}ms">
          <span class="rank">${i + 1}</span>
          <div class="result-body">
            <a class="result-title-link" href="${escHtml(r.url)}" target="_blank" rel="noopener">
              <div class="result-title">${escHtml(title)}</div>
            </a>
            <a class="result-url" href="${escHtml(r.url)}" target="_blank" rel="noopener">${escHtml(r.url)}</a>
          </div>
          <span class="freq-badge">&#8679; ${r.total_freq}</span>
        </div>`;
    });

    area.innerHTML = html;
  }

  function clearResults() {
    document.getElementById("results-area").innerHTML = "";
    document.getElementById("hero").classList.remove("has-results");
  }

  function showError(msg) {
    document.getElementById("results-area").innerHTML = `<p class="error-msg">${escHtml(msg)}</p>`;
  }

  loadTopics();

  function extractDomain(url) {
    try { return new URL(url).hostname; } catch { return url; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
